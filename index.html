<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f1220" />
<meta name="description" content="Vyrona — a gamified life operating system. Track habits, crush goals, level up." />
<title>Vyrona — Level Up Your Life</title>

<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icons/icon-192.svg" />

<link rel="stylesheet" href="css/variables.css" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body data-theme-mode="dark" data-theme-skin="nebula">

  <!-- Auth Gate -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">
        <span class="brand-mark">V</span>
        <h1>Vyrona</h1>
        <p class="brand-tag">Your life. Gamified.</p>
      </div>

      <div id="auth-status" class="auth-status" hidden></div>

      <form id="auth-form" class="auth-form">
        <label class="field">
          <span>Email</span>
          <input type="email" id="auth-email" autocomplete="email" required placeholder="you@example.com" />
        </label>
        <label class="field">
          <span>Password</span>
          <input type="password" id="auth-password" autocomplete="current-password" required placeholder="••••••••" minlength="6" />
        </label>
        <button type="submit" class="btn btn-primary btn-block" id="auth-submit">Sign in</button>
      </form>

      <div class="auth-switch">
        <span id="auth-toggle-text">New here?</span>
        <button type="button" id="auth-toggle" class="btn-link">Create an account</button>
      </div>

      <div class="auth-divider"><span>or</span></div>

      <button type="button" id="auth-guest" class="btn btn-ghost btn-block">Continue offline (Guest)</button>

      <p class="auth-footnote" id="auth-config-note"></p>
    </div>
  </div>

  <!-- App Shell -->
  <div id="app" class="app" hidden>

    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="brand-mark small">V</span>
        <span class="brand-name">Vyrona</span>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="btn-notifications" title="Notifications" aria-label="Notifications">
          🔔<span class="dot" id="notif-dot" hidden></span>
        </button>
        <button class="icon-btn" id="btn-settings-shortcut" title="Settings" aria-label="Settings">⚙️</button>
        <div class="avatar" id="topbar-avatar">S</div>
      </div>
    </header>

    <!-- Main view -->
    <main id="view-root" class="view-root"></main>

    <!-- Bottom nav (mobile) / Side nav (desktop) -->
    <nav class="nav" id="main-nav">
      <button class="nav-item" data-route="dashboard" aria-label="Dashboard">
        <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
      </button>
      <button class="nav-item" data-route="habits" aria-label="Habits">
        <span class="nav-icon">🔥</span><span class="nav-label">Habits</span>
      </button>
      <button class="nav-item" data-route="goals" aria-label="Goals">
        <span class="nav-icon">🎯</span><span class="nav-label">Goals</span>
      </button>
      <button class="nav-item" data-route="journal" aria-label="Journal">
        <span class="nav-icon">📓</span><span class="nav-label">Journal</span>
      </button>
      <button class="nav-item" data-route="review" aria-label="Review">
        <span class="nav-icon">📊</span><span class="nav-label">Review</span>
      </button>
      <button class="nav-item" data-route="achievements" aria-label="Achievements">
        <span class="nav-icon">🏆</span><span class="nav-label">Awards</span>
      </button>
      <button class="nav-item" data-route="settings" aria-label="Settings">
        <span class="nav-icon">⚙️</span><span class="nav-label">Settings</span>
      </button>
    </nav>

    <!-- Toast / XP popups -->
    <div id="toast-layer" class="toast-layer" aria-live="polite"></div>
    <div id="xp-fx-layer" class="xp-fx-layer"></div>
  </div>

  <!-- Modal root -->
  <div id="modal-root"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
